schema_version = "1.0.0"

blender_version_min = "4.2.0"
id = "gesture_helper"
license = ["SPDX:GPL-3.0-or-later", ]
maintainer = "ACGGIT Community(小萌新)"
name = "Gesture Helper"
tagline = "Quickly use gestures to run the operator or change properties"
type = "add-on"
version = "2.3.3"
tags = ["3D View", "User Interface"]
website = "https://github.com/AIGODLIKE/gesture_helper"
support = "https://github.com/AIGODLIKE/gesture_helper/issues"

[build]
paths_exclude_pattern = [
    "__pycache__/",
    "/.git/",
    "/*.zip",
    ".cursor/",
    "backups/",
    "**/svg_2_png.py",
    "README.md",
]

[permissions]
files = "Import/Export Gesture preset"
