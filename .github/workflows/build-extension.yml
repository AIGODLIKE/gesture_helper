name: Build Extension

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Blender
        uses: bradyajohnston/setup-blender@v5
        with:
          # Extension build CLI is available since 4.2; use LTS for stable packaging.
          version: "4.2"

      - name: Validate extension
        run: blender --command extension validate

      - name: Build extension zip
        run: |
          set -euo pipefail
          mkdir -p dist
          blender --command extension build --source-dir . --output-dir dist --verbose
          ls -lh dist/*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gesture_helper
          path: dist/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
