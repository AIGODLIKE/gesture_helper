name: Build Extension

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Official LTS used only for packaging (`extension build` / `validate`).
  BLENDER_VERSION: "4.2.22"
  BLENDER_SERIES: "4.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Blender
        run: |
          set -euo pipefail
          archive="blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          url="https://download.blender.org/release/Blender${BLENDER_SERIES}/${archive}"
          curl -fsSL -o "$RUNNER_TEMP/$archive" "$url"
          tar -C "$RUNNER_TEMP" -xf "$RUNNER_TEMP/$archive"
          blender_bin="$(find "$RUNNER_TEMP" -type f -name blender -path "*/blender-${BLENDER_VERSION}-linux-x64/*" | head -n1)"
          test -x "$blender_bin"
          echo "BLENDER_BIN=$blender_bin" >> "$GITHUB_ENV"
          "$blender_bin" --version

      - name: Validate extension
        run: |
          set -euo pipefail
          "$BLENDER_BIN" --command extension validate

      - name: Build extension zip
        run: |
          set -euo pipefail
          mkdir -p dist
          "$BLENDER_BIN" --command extension build --source-dir . --output-dir dist --verbose
          ls -lh dist/*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gesture_helper
          path: dist/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.zip
          generate_release_notes: true
