schema_version = "1.0.0"

blender_version_min = "4.2.0"
id = "gesture_helper"
license = ["SPDX:GPL-3.0-or-later"]
copyright = [
    "2024-2026 ACGGIT Community",
    "Icon picker UI adapted from Icon Viewer by Robin Aerts (GPL-3.0-or-later)",
    "Icons in src/icon/blender/ derived from Blender Foundation SVG icons, converted to PNG (GPL-2.0-or-later / GPL-3.0-or-later)",
]
maintainer = "ACGGIT Community(小萌新)"
name = "Gesture Helper"
tagline = "Quickly use gestures to run the operator or change properties"
type = "add-on"
version = "2.3.4"
tags = ["3D View", "User Interface"]
website = "https://github.com/AIGODLIKE/gesture_helper"
support = "https://github.com/AIGODLIKE/gesture_helper/issues"

[build]
paths_exclude_pattern = [
    "__pycache__/",
    "/.git/",
    "/.cursor/",
    "/.idea/",
    "/.vscode/",
    "/.github/",
    "/*.zip",
    "/.editorconfig",
    "/.gitignore",
    "/.gitattributes",
    "/README.md",
    "/backups/",
    "/auto_backups/",
    "**/svg_2_png.py",
    "**/*.pyc",
    "**/*.pyo",
    "**/.DS_Store",
    "**/Thumbs.db",
]

[permissions]
files = "Read/write gestures, backups, custom icons, and preference files"
clipboard = "Copy selected icon names to the clipboard"
